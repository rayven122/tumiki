services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: tumiki-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_vol:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: tumiki-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc mb --ignore-existing local/${OBJECT_STORAGE_BUCKET:-tumiki-assets};
      mc anonymous set download local/${OBJECT_STORAGE_BUCKET:-tumiki-assets}/org-assets;
      mc anonymous set download local/${OBJECT_STORAGE_BUCKET:-tumiki-assets}/connector-assets;
      "
    environment:
      MC_HOST_local: http://${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}:${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}@minio:9000
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-tumiki-assets}

  internal-manager:
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL_INTERNAL_MANAGER:?NEXTAUTH_URL_INTERNAL_MANAGER is required}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-auto}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-tumiki-assets}
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL:?OBJECT_STORAGE_PUBLIC_BASE_URL is required}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  minio_vol:
