# tumiki-system Namespace の NetworkPolicy
# - Ingress: 全テナント Namespace + 外部 LoadBalancer からの mTLS ポート（HTTPS）のみ受け入れ
# - Egress: DNS と Infisical PKI への HTTPS のみ許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tumiki-cloud-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tumiki-cloud-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tumiki-cloud-api.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 全 Namespace（テナント含む）からの内部アクセスを mTLS ポートに対してのみ許可
    # 認証は mTLS / Bootstrap Token で行うため、ネットワーク層では幅広に許可する
    - from:
        - namespaceSelector: {}
      ports:
        - port: {{ .Values.server.port }}
          protocol: TCP
    # 外部からの LoadBalancer 経由のトラフィック（出口 IP は不定なので Pod 制限なし）
    # ports は LB が targetPort に転送するため同じ
  egress:
    # DNS（kube-system 内の CoreDNS のみ）
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # 外部 HTTPS（Infisical PKI / Operator 等）
    - ports:
        - port: 443
          protocol: TCP
