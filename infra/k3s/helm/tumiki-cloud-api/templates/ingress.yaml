# Cloudflare Tunnel が TLS を担うため、クラスター内は HTTP のみ
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tumiki-cloud-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tumiki-cloud-api.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tumiki-cloud-api
                port:
                  number: {{ .Values.server.port }}
