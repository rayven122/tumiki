# Infisical Machine Identity 認証情報 Secret
# hosting-console が helm install --set infisical.clientId/clientSecret で渡す
apiVersion: v1
kind: Secret
metadata:
  name: infisical-machine-identity
  namespace: {{ include "internal-manager.namespace" . }}
  labels:
    {{- include "internal-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  clientId: {{ .Values.infisical.clientId | quote }}
  clientSecret: {{ .Values.infisical.clientSecret | quote }}
