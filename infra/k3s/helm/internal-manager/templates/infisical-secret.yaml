# InfisicalSecret CRD
# Infisical Kubernetes Operator が監視し、Infisical → k8s Secret へ自動同期する
# 同期されるシークレット: OIDC_ISSUER, OIDC_CLIENT_ID, OIDC_CLIENT_SECRET,
#                         INTERNAL_DATABASE_URL, AUTH_SECRET
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: internal-manager-secrets
  namespace: {{ include "internal-manager.namespace" . }}
  labels:
    {{- include "internal-manager.labels" . | nindent 4 }}
spec:
  hostAPI: {{ .Values.infisical.hostAPI }}
  resyncInterval: {{ .Values.infisical.resyncInterval }}
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: {{ .Values.infisical.projectSlug | quote }}
        envSlug: {{ .Values.infisical.environment | quote }}
        secretsPath: "/"
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: {{ include "internal-manager.namespace" . }}
  managedKubeSecret:
    secretName: internal-manager-env
    secretNamespace: {{ include "internal-manager.namespace" . }}
    creationPolicy: Owner
