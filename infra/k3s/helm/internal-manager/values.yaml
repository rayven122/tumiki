# テナント情報
tenant:
  slug: ""         # 例: company-a
  domain: ""       # 例: company-a-manager.tumiki.cloud
  oidcType: "KEYCLOAK"  # KEYCLOAK または CUSTOM

# コンテナイメージ
image:
  repository: ghcr.io/rayven122/tumiki-internal-manager
  tag: ""
  pullPolicy: IfNotPresent

# Infisical 設定
infisical:
  hostAPI: https://secrets.rayven.cloud/api
  projectSlug: ""      # 例: tenant-company-a
  secretsPath: "/internal-manager"  # Infisical プロジェクト内のシークレットパス（テナント間で共通の慣習名）
  environment: ""    # 必須: prod / dev / staging など Infisical の環境スラグ
  resyncInterval: 60
  # Machine Identity 認証情報は kubectl で k8s Secret として事前作成（Helmリリース値への保存を防ぐ）
  # Secret名: infisical-machine-identity（createTenant.ts が kubectl apply で作成）

# internal-manager のリソース制限
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# PostgreSQL 設定
postgresql:
  user: "app"           # アプリ用の限定権限ユーザー（superuser である postgres は使わない）
  database: "internal_manager"
  storage: "10Gi"
  storageClassName: "local-path"
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Namespace 単位のリソースクォータ
resourceQuota:
  requests:
    cpu: "300m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"
  # オブジェクト数制限（暴走時の k8s control plane 負荷を抑制）
  objects:
    pods: "10"
    services: "5"
    persistentvolumeclaims: "3"

# Ingress 設定
# TLSはCloudflare Tunnelが担うためクラスター内はHTTP
ingress:
  className: traefik
