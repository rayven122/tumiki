# tenant-console は tRPC API から helm/kubectl を実行してテナント Namespace をプロビジョニングする
# ClusterRole には tenant-console-tenant-operator と同等の権限が必要。
# k8s RBAC エスカレーション防止の制約により、自身が持っていない権限を RoleBinding で付与できないため。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-console
  namespace: tenant-console
  labels:
    {{- include "tenant-console.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-console
  labels:
    {{- include "tenant-console.labels" . | nindent 4 }}
rules:
  # Namespace ライフサイクル
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete", "patch"]
  # テナント Namespace 内のリソース（RBAC エスカレーション防止: RoleBinding で付与する権限は自身も保有する必要がある）
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "services", "persistentvolumeclaims", "serviceaccounts"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # InfisicalSecret CRD
  - apiGroups: ["secrets.infisical.com"]
    resources: ["infisicalsecrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Pod / ReplicaSet 状態確認
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-console
  labels:
    {{- include "tenant-console.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-console
subjects:
  - kind: ServiceAccount
    name: tenant-console
    namespace: tenant-console
---
# テナント Namespace 内で許可する権限を定義する ClusterRole
# createTenant.ts がテナント Namespace を作成した直後にこの ClusterRole を参照する
# RoleBinding を当該 Namespace に作成することで、tenant-console の権限が
# その Namespace に限定される（aggregateする ClusterRole として活用）。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-console-tenant-operator
  labels:
    {{- include "tenant-console.labels" . | nindent 4 }}
rules:
  # Helm リリースが管理する基本リソース
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "services", "persistentvolumeclaims", "serviceaccounts"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # InfisicalSecret CRD
  - apiGroups: ["secrets.infisical.com"]
    resources: ["infisicalsecrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
