# tenant-console は tRPC API から helm/kubectl を実行してテナント Namespace をプロビジョニングする
# そのため Pod に対応する ServiceAccount + ClusterRole を付与する
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-console
  namespace: tenant-console
  labels:
    {{- include "tenant-console.labels" . | nindent 4 }}
---
# テナント Namespace のライフサイクル管理に必要な権限
# - Namespace 作成 / 削除（tenant-{slug}）
# - Helm install/uninstall に必要な全リソース作成権限
# - Secret 作成（infisical-machine-identity）
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-console
  labels:
    {{- include "tenant-console.labels" . | nindent 4 }}
rules:
  # Namespace ライフサイクル
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete", "patch"]
  # Helm リリースが管理する基本リソース
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "services", "persistentvolumeclaims", "serviceaccounts"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # InfisicalSecret CRD
  - apiGroups: ["secrets.infisical.com"]
    resources: ["infisicalsecrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Helm が release 情報を保存する Secret を読み書きするため（namespace スコープでも動くが安全側で cluster）
  # Pod / ReplicaSet 状態確認
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-console
  labels:
    {{- include "tenant-console.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-console
subjects:
  - kind: ServiceAccount
    name: tenant-console
    namespace: tenant-console
