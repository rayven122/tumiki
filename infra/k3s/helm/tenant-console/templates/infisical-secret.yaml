# Infisical Operator が監視し Infisical → k8s Secret 'tenant-console-env' へ自動同期
# 同期されるキー: TENANT_DATABASE_URL, POSTGRES_PASSWORD, AUTH_SECRET など
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: tenant-console-secrets
  namespace: tenant-console
  labels:
    {{- include "tenant-console.labels" . | nindent 4 }}
spec:
  hostAPI: {{ .Values.infisical.hostAPI }}
  resyncInterval: {{ .Values.infisical.resyncInterval }}
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: {{ .Values.infisical.projectSlug | quote }}
        envSlug: {{ .Values.infisical.environment | quote }}
        secretsPath: {{ .Values.infisical.secretsPath | quote }}
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: tenant-console
  managedKubeSecret:
    secretName: tenant-console-env
    secretNamespace: tenant-console
    creationPolicy: Owner
