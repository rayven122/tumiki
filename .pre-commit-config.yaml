repos:
  - repo: local
    hooks:
      # pre-commit: 高速チェック（turboキャッシュ活用）
      - id: lint
        name: ESLint
        entry: pnpm lint
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: format
        name: Prettier
        entry: pnpm format
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: secret-scan
        name: Infisical Secret Scan
        entry: infisical scan git-changes --staged --exit-code 1
        language: system
        stages: [pre-commit]
        pass_filenames: false

      # pre-push: 包括的チェック
      - id: typecheck
        name: TypeScript typecheck
        entry: pnpm typecheck
        language: system
        stages: [pre-push]
        pass_filenames: false

      - id: test
        name: Vitest tests
        entry: pnpm test
        language: system
        stages: [pre-push]
        pass_filenames: false
