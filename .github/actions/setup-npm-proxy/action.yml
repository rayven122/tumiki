name: Setup NPM proxy
description: Setup NPM proxy for self-arc runners

inputs:
  npm-proxy-url:
    description: NPM proxy URL
    default: "http://verdaccio.arc-tools.svc.cluster.local"

runs:
  using: composite
  steps:
    - name: Check proxy server
      shell: bash
      id: check-npm-proxy
      run: |
        if curl --silent --fail --max-time 5 --connect-timeout 3 "${{ inputs.npm-proxy-url }}/health" > /dev/null 2>&1; then
          echo "NPM proxy is available at ${{ inputs.npm-proxy-url }}"
          echo "npm-proxy-available=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Set NPM proxy environment variables
      if: steps.check-npm-proxy.outputs.npm-proxy-available == 'true'
      shell: bash
      run: |
        echo "NPM proxy is available. Setting environment variables."
        echo "NPM_CONFIG_REGISTRY=${{ inputs.npm-proxy-url }}" >> "$GITHUB_ENV"
