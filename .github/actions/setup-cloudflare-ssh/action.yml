name: Setup Cloudflare SSH
description: Cloudflare Tunnel + Access Service Token 経由で SSH できるようにセットアップする

inputs:
  tunnel-hostname:
    description: 'Cloudflare Tunnel のホスト名（例: stg-ssh.tumiki.cloud）'
    required: true
  cf-access-client-id:
    description: 'Cloudflare Access Service Token の Client ID'
    required: true
  cf-access-client-secret:
    description: 'Cloudflare Access Service Token の Client Secret'
    required: true

runs:
  using: composite
  steps:
    - name: Install cloudflared
      shell: bash
      run: |
        curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
        sudo dpkg -i /tmp/cloudflared.deb

    - name: Configure SSH
      shell: bash
      env:
        TUNNEL_HOSTNAME: ${{ inputs.tunnel-hostname }}
        CF_ID: ${{ inputs.cf-access-client-id }}
        CF_SECRET: ${{ inputs.cf-access-client-secret }}
      run: |
        mkdir -p ~/.ssh

        # Service Token を埋め込んだラッパースクリプトを生成
        # ProxyCommand 経由では env 変数が継承されないため直接埋め込む
        cat > /tmp/cf-proxy.sh << EOF
        #!/bin/bash
        exec env CF_ACCESS_CLIENT_ID="${CF_ID}" CF_ACCESS_CLIENT_SECRET="${CF_SECRET}" cloudflared access ssh --hostname "\$@"
        EOF
        chmod +x /tmp/cf-proxy.sh

        cat >> ~/.ssh/config << CONFIG
        Host ${TUNNEL_HOSTNAME}
          ProxyCommand /tmp/cf-proxy.sh %h
          StrictHostKeyChecking accept-new
        CONFIG
