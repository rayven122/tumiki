name: Setup Cloudflare SSH
description: cloudflaredインストール、Cloudflare Access SSH設定、SSH鍵設定をまとめて行う

inputs:
  ssh-host:
    description: SSH接続先ホスト名（Cloudflare Tunnel経由）
    required: true
  cf-access-client-id:
    description: Cloudflare Access Service Token の Client ID
    required: true
  cf-access-client-secret:
    description: Cloudflare Access Service Token の Client Secret
    required: true
  ssh-private-key:
    description: SSH秘密鍵
    required: true

runs:
  using: composite
  steps:
    - name: Install cloudflared
      shell: bash
      run: |
        curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
        sudo dpkg -i /tmp/cloudflared.deb

    - name: Configure Cloudflare SSH
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh-host }}
        CF_ACCESS_CLIENT_ID: ${{ inputs.cf-access-client-id }}
        CF_ACCESS_CLIENT_SECRET: ${{ inputs.cf-access-client-secret }}
      run: |
        mkdir -p ~/.ssh

        cat > /tmp/cf-proxy.sh << WRAPPER
        #!/bin/bash
        exec cloudflared access ssh \
          --service-token-id "${CF_ACCESS_CLIENT_ID}" \
          --service-token-secret "${CF_ACCESS_CLIENT_SECRET}" \
          --hostname "\$@"
        WRAPPER
        chmod +x /tmp/cf-proxy.sh

        cat >> ~/.ssh/config << CONFIG
        Host ${SSH_HOST}
          ProxyCommand /tmp/cf-proxy.sh %h
          StrictHostKeyChecking accept-new
        CONFIG

    - name: Setup SSH key
      shell: bash
      run: |
        echo "${{ inputs.ssh-private-key }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
