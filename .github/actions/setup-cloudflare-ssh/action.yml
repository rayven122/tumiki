name: Setup Cloudflare SSH
description: Cloudflare Tunnel + Access Service Token 経由で SSH できるようにセットアップする

inputs:
  tunnel-hostname:
    description: 'Cloudflare Tunnel のホスト名（例: staging.tumiki.cloud）'
    required: true
  ssh-key:
    description: 'SSH 秘密鍵（PEM 形式）'
    required: true
  cf-access-client-id:
    description: 'Cloudflare Access Service Token の Client ID'
    required: true
  cf-access-client-secret:
    description: 'Cloudflare Access Service Token の Client Secret'
    required: true

runs:
  using: composite
  steps:
    - name: Install cloudflared
      shell: bash
      run: |
        curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
        sudo dpkg -i /tmp/cloudflared.deb

    - name: Configure SSH
      shell: bash
      env:
        TUNNEL_HOSTNAME: ${{ inputs.tunnel-hostname }}
        CF_ACCESS_CLIENT_ID: ${{ inputs.cf-access-client-id }}
        CF_ACCESS_CLIENT_SECRET: ${{ inputs.cf-access-client-secret }}
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh-key }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key

        # cloudflared が自動参照する Service Token
        echo "CLOUDFLARE_ACCESS_CLIENT_ID=${CF_ACCESS_CLIENT_ID}" >> "$GITHUB_ENV"
        echo "CLOUDFLARE_ACCESS_CLIENT_SECRET=${CF_ACCESS_CLIENT_SECRET}" >> "$GITHUB_ENV"

        cat >> ~/.ssh/config << EOF
        Host ${TUNNEL_HOSTNAME}
          ProxyCommand cloudflared access ssh --hostname %h
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
          IdentityFile ~/.ssh/deploy_key
        EOF
