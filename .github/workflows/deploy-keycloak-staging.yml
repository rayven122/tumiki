name: Deploy Keycloak Staging

on:
  push:
    branches: [main]
    paths:
      - 'docker/keycloak-staging/**'
      - 'docker/keycloak/themes/tumiki/**'
  workflow_dispatch:

concurrency:
  group: deploy-keycloak-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: 🔑 Deploy Keycloak to Staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30

    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      SSH_HOST: ${{ vars.KEYCLOAK_TUNNEL_HOSTNAME }}
      SSH_USER: ${{ vars.KEYCLOAK_DEPLOY_USER }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🌐 Setup Cloudflare SSH
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          ssh-host: ${{ env.SSH_HOST }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: 📤 Transfer files
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p ~/keycloak/themes"
          scp -i ~/.ssh/id_ed25519 \
            docker/keycloak-staging/compose.yaml \
            "${SSH_USER}@${SSH_HOST}:~/keycloak/compose.yaml"
          scp -r -i ~/.ssh/id_ed25519 \
            docker/keycloak/themes/tumiki \
            "${SSH_USER}@${SSH_HOST}:~/keycloak/themes/"

      - name: 🔐 Deploy Keycloak
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash << 'REMOTE_SCRIPT'
            set -euo pipefail
            cd ~/keycloak
            infisical run --env=staging --domain https://secrets.rayven.cloud -- docker compose pull keycloak
            infisical run --env=staging --domain https://secrets.rayven.cloud -- docker compose up -d --force-recreate keycloak
          REMOTE_SCRIPT

      - name: ✅ Verify Keycloak health
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash << 'HEALTHCHECK'
            for i in $(seq 1 30); do
              if curl -sf http://localhost:9000/health/ready > /dev/null 2>&1; then
                echo "=== Keycloak ===" && curl -sf http://localhost:9000/health/ready | (command -v jq &>/dev/null && jq . || cat)
                exit 0
              fi
              echo "Waiting... ($i/30)" && sleep 10
            done
            echo "Timeout: Keycloakが起動しませんでした"
            cd ~/keycloak && docker compose logs keycloak --tail=50
            exit 1
          HEALTHCHECK

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f /tmp/cloudflared.deb /tmp/cf-proxy.sh ~/.ssh/id_ed25519 ~/.ssh/config
