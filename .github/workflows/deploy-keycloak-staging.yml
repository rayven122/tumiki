name: Deploy Keycloak Staging

on:
  push:
    branches: [main]
    paths:
      - 'docker/keycloak-staging/**'
      - 'docker/keycloak/themes/tumiki/**'
  workflow_dispatch:

concurrency:
  group: deploy-keycloak-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: 🔑 Deploy Keycloak to Staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30

    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      SSH_HOST: ${{ vars.KEYCLOAK_TUNNEL_HOSTNAME }}
      SSH_USER: ${{ vars.KEYCLOAK_DEPLOY_USER }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🌐 Setup Cloudflare SSH
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          ssh-host: ${{ env.SSH_HOST }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: 📤 Transfer files
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p ~/keycloak/themes"
          scp -i ~/.ssh/id_ed25519 \
            docker/keycloak-staging/compose.yaml \
            "${SSH_USER}@${SSH_HOST}:~/keycloak/compose.yaml"
          scp -r -i ~/.ssh/id_ed25519 \
            docker/keycloak/themes/tumiki \
            "${SSH_USER}@${SSH_HOST}:~/keycloak/themes/"

      - name: 🔐 Deploy Keycloak
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_SECRET }}
        run: |
          # ${INFISICAL_CLIENT_ID/SECRET} はランナー側で展開してリモートに送信する（意図的なクォートなしヒアドキュメント）
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash -l << REMOTE_SCRIPT
            set -euo pipefail
            cd ~/keycloak
            # Machine Identity で自動ログイン（ブラウザ不要）
            ~/.local/bin/infisical login \
              --method=universal-auth \
              --client-id="${INFISICAL_CLIENT_ID}" \
              --client-secret="${INFISICAL_CLIENT_SECRET}" \
              --domain https://secrets.rayven.cloud \
              --silent
            ~/.local/bin/infisical run --env=staging --domain https://secrets.rayven.cloud -- docker compose pull keycloak
            # --remove-orphans: compose.yaml から削除されたサービスのコンテナを合わせてクリーンアップ
            ~/.local/bin/infisical run --env=staging --domain https://secrets.rayven.cloud -- docker compose up -d --force-recreate --remove-orphans keycloak
          REMOTE_SCRIPT

      - name: ✅ Verify Keycloak health
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash -l << 'HEALTHCHECK'
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' tumiki-keycloak 2>/dev/null || echo "unknown")
              if [ "${STATUS}" = "healthy" ]; then
                echo "Keycloak is healthy"
                exit 0
              fi
              echo "Waiting... ($i/30) Status: ${STATUS}" && sleep 10
            done
            echo "Timeout: Keycloakが起動しませんでした"
            cd ~/keycloak && docker compose logs keycloak --tail=50
            exit 1
          HEALTHCHECK

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f /tmp/cloudflared.deb /tmp/cf-proxy.sh ~/.ssh/id_ed25519 ~/.ssh/config
