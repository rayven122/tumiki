name: Deploy Keycloak Staging

on:
  push:
    branches: [main]
    paths:
      - 'docker/keycloak-staging/**'
      - 'docker/keycloak/themes/tumiki/**'
  workflow_dispatch:

concurrency:
  group: deploy-keycloak-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: 🔑 Deploy Keycloak to Staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30

    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      # Cloudflare tunnel 経由の踏み台サーバー経由で Keycloak VM に ProxyJump
      SSH_JUMP_HOST: ssh.tumiki.cloud
      SSH_KEYCLOAK_HOST: 192.168.0.90
      SSH_USER: ubuntu

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🌐 Setup Cloudflare SSH
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          ssh-host: ${{ env.SSH_JUMP_HOST }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: 🔗 Configure ProxyJump for Keycloak VM
        run: |
          cat >> ~/.ssh/config << CONFIG
          Host ${SSH_KEYCLOAK_HOST}
            ProxyJump ${SSH_USER}@${SSH_JUMP_HOST}
            StrictHostKeyChecking accept-new
          CONFIG

      - name: 📤 Transfer files
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_KEYCLOAK_HOST}" \
            "sudo mkdir -p /opt/keycloak/themes"
          scp -i ~/.ssh/id_ed25519 \
            docker/keycloak-staging/compose.yaml \
            "${SSH_USER}@${SSH_KEYCLOAK_HOST}:/tmp/kc-compose.yaml"
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_KEYCLOAK_HOST}" \
            "sudo mv /tmp/kc-compose.yaml /opt/keycloak/compose.yaml"
          tar -czf - -C docker/keycloak/themes tumiki \
            | ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_KEYCLOAK_HOST}" \
              "sudo tar -xzf - -C /opt/keycloak/themes"

      - name: 🔐 Deploy Keycloak
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_KEYCLOAK_HOST}" bash -l << 'REMOTE_SCRIPT'
            set -euo pipefail
            cd /opt/keycloak
            # Infisical からシークレットを .env に書き出して docker compose に渡す
            infisical export --env=staging --domain https://secrets.rayven.cloud --format=dotenv \
              | sudo tee /opt/keycloak/.env > /dev/null
            sudo docker compose pull keycloak
            # --remove-orphans: compose.yaml から削除されたサービスのコンテナを合わせてクリーンアップ
            sudo docker compose up -d --force-recreate --remove-orphans keycloak
          REMOTE_SCRIPT

      - name: ✅ Verify Keycloak health
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_KEYCLOAK_HOST}" bash -l << 'HEALTHCHECK'
            for i in $(seq 1 30); do
              STATUS=$(sudo docker inspect --format='{{.State.Health.Status}}' \
                $(sudo docker compose -f /opt/keycloak/compose.yaml ps -q keycloak) 2>/dev/null || echo "unknown")
              if [ "${STATUS}" = "healthy" ]; then
                echo "Keycloak is healthy"
                exit 0
              fi
              echo "Waiting... ($i/30) Status: ${STATUS}" && sleep 10
            done
            echo "Timeout: Keycloakが起動しませんでした"
            sudo docker compose -f /opt/keycloak/compose.yaml logs keycloak --tail=50
            exit 1
          HEALTHCHECK

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f /tmp/cloudflared.deb /tmp/cf-proxy.sh ~/.ssh/id_ed25519 ~/.ssh/config
