name: Deploy to k3s

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "デプロイするイメージタグ（例: 1.0.0, sha-abc1234）"
        required: true

jobs:
  deploy-tenant-console:
    name: 🚀 Deploy tenant-console to k3s
    runs-on: { group: self-arc }
    # 起動条件:
    #   - 手動実行 (workflow_dispatch): 任意のタグでデプロイ
    #   - リリースタグ (v*) で Docker Publish が成功した場合のみ自動デプロイ
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    timeout-minutes: 10

    env:
      SSH_HOST: ssh.tumiki.cloud
      SSH_USER: deploy
      K3S_HOST: 192.168.0.20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # workflow_run の場合はトリガー元の SHA を、それ以外は現在の ref を取得
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve image tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
          # 例: "v1.0.0" のタグ名（workflow_run 時のみセットされる）
          HEAD_REF: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ -n "${INPUT_TAG}" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          elif [[ "${HEAD_REF}" =~ ^v[0-9] ]]; then
            # docker-publish.yml の type=semver,pattern={{version}} は v プレフィックスを除去するため
            echo "tag=${HEAD_REF#v}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Could not resolve image tag (HEAD_REF=${HEAD_REF})"
            exit 1
          fi

      - name: 🌐 Setup Cloudflare SSH
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          ssh-host: ${{ env.SSH_HOST }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          ssh-private-key: ${{ secrets.K3S_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Configure k3s ProxyJump
        run: |
          # composite action は ProxyCommand のみ設定するため、User/IdentityFile と
          # k3s ノードへの ProxyJump 設定をここで追加する
          # 同一 Host を複数ブロックで指定すると最初に現れた値が優先されるため
          # composite action のブロックには上書きされず累積される
          cat >> ~/.ssh/config << CONFIG
          Host ${SSH_HOST}
            User ${SSH_USER}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new

          Host k3s-deploy
            HostName ${K3S_HOST}
            User ${SSH_USER}
            ProxyJump ${SSH_HOST}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          CONFIG

      - name: Copy Helm chart to k3s node
        run: |
          scp -r infra/k3s/helm/tenant-console k3s-deploy:/opt/tumiki-charts/

      - name: Deploy via Helm
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          ssh k3s-deploy helm upgrade tenant-console /opt/tumiki-charts/tenant-console \
            -n tenant-console \
            --reuse-values \
            --set "image.tag=${IMAGE_TAG}" \
            --atomic \
            --timeout 120s

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519 /tmp/cf-proxy.sh
