name: 🔍 Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    name: 📝 Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # レビューコメントを1つに統合し、更新時に上書き
          use_sticky_comment: "true"

          prompt: |
            ## レビュー準備
            以下を読み込み、規約を把握してください：
            - `CLAUDE.md`
            - `.claude/rules/typescript.md`
            - `.claude/rules/testing.md`
            - `.claude/rules/frontend.md`

            ## レビュー実施
            1. 規約違反を最優先でチェック
            2. コード品質・設計原則・バグ・セキュリティを確認
            3. 各指摘に重要度スコア（1-10）を付与
            4. 改善コード例を提示

          track_progress: true

          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*),Read"
            --append-system-prompt "日本語で回答。規約違反は重要度8以上として報告。

            ## レビューフィードバック方法
            - すべての指摘はPRコメント（gh pr comment）にまとめて記載する

            ## 出力フォーマット

            ### 🤖 Claude Code Review

            **総合評価**: ✅ 承認可能 / ⚠️ 改善推奨 / ❌ 要修正

            **重要度分布**: 🔴 緊急(8-10): X件 / 🟡 重要(5-7): X件 / 🟢 軽微(1-4): X件

            ### 指摘事項

            **🔴 [重要度: X/10] 問題の概要**
            - ファイル: path/to/file.ts:行番号
            - 現在のコード: ...
            - 改善案: ...
            - 理由: ...

            ### ✨ 良い点
            - ...

            ### 🎯 次のアクション
            1. ..."
