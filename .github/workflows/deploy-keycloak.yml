name: Deploy Keycloak Configuration

on:
  push:
    branches: [main]
    paths:
      - 'terraform/keycloak/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        type: choice
        options: [staging, production]
        default: staging
      dry_run:
        description: 'Plan only (no apply)'
        type: boolean
        default: false

concurrency:
  group: keycloak-tf-${{ github.event_name == 'release' && 'production' || inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-staging:
    name: 🔑 Deploy Keycloak Config to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment: staging

    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      SSH_HOST: ${{ vars.KEYCLOAK_TUNNEL_HOSTNAME }}
      SSH_USER: ${{ vars.KEYCLOAK_DEPLOY_USER }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🌐 Setup Cloudflare SSH
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          ssh-host: ${{ env.SSH_HOST }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          # DEPLOY_SSH_PRIVATE_KEY は GitHub environment ごとに異なる値を設定
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: 📤 Transfer Terraform files
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p ~/keycloak-tf"
          tar -czf - -C terraform/keycloak \
            --exclude='.terraform' --exclude='*.tfstate' --exclude='*.tfstate.*' \
            . | ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "tar -xzf - -C ~/keycloak-tf"

      - name: 🏗️ Terraform Apply (staging)
        env:
          INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_ID }}
          INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_SECRET }}
        run: |
          # 環境変数経由でシークレットを渡す（CLIオプション経由はps auxで漏洩するリスクがあるため）
          # クォートなしヒアドキュメントでランナー側の環境変数をリモートに展開する
          # infisical はパッケージマネージャーでインストール済みのためPATH経由で呼び出す
          # （Keycloak VMはsudo不可のため ~/.local/bin/ に個別インストールしているが、こちらはapt install済み）
          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash -l << REMOTE_SCRIPT
            set -euo pipefail
            set +o history
            cd ~/keycloak-tf
            export INFISICAL_UNIVERSAL_AUTH_CLIENT_ID="${INFISICAL_UNIVERSAL_AUTH_CLIENT_ID}"
            export INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET="${INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET}"
            infisical run --method=universal-auth --env=staging --domain https://secrets.rayven.cloud -- \
              terraform init -input=false
            infisical run --method=universal-auth --env=staging --domain https://secrets.rayven.cloud -- \
              terraform validate
            if [ "${DRY_RUN}" = "true" ]; then
              infisical run --method=universal-auth --env=staging --domain https://secrets.rayven.cloud -- \
                terraform plan -var-file=terraform.tfvars.staging -input=false -no-color
            else
              infisical run --method=universal-auth --env=staging --domain https://secrets.rayven.cloud -- \
                terraform apply -var-file=terraform.tfvars.staging -auto-approve -input=false -no-color
            fi
          REMOTE_SCRIPT

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f /tmp/cloudflared.deb /tmp/cf-proxy.sh ~/.ssh/id_ed25519 ~/.ssh/config

  deploy-production:
    name: 🔑 Deploy Keycloak Config to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment: production

    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      SSH_HOST: ${{ vars.KC_PROD_TUNNEL_HOSTNAME }}
      SSH_USER: ${{ vars.KC_PROD_DEPLOY_USER }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🌐 Setup Cloudflare SSH
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          ssh-host: ${{ env.SSH_HOST }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          # DEPLOY_SSH_PRIVATE_KEY は GitHub environment ごとに異なる値を設定
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: 📤 Transfer Terraform files
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p ~/keycloak-tf"
          tar -czf - -C terraform/keycloak \
            --exclude='.terraform' --exclude='*.tfstate' --exclude='*.tfstate.*' \
            . | ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "tar -xzf - -C ~/keycloak-tf"

      - name: 🏗️ Terraform Apply (production)
        env:
          INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_ID }}
          INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_SECRET }}
        run: |
          # 環境変数経由でシークレットを渡す（CLIオプション経由はps auxで漏洩するリスクがあるため）
          # クォートなしヒアドキュメントでランナー側の環境変数をリモートに展開する
          # infisical はパッケージマネージャーでインストール済みのためPATH経由で呼び出す
          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash -l << REMOTE_SCRIPT
            set -euo pipefail
            set +o history
            cd ~/keycloak-tf
            export INFISICAL_UNIVERSAL_AUTH_CLIENT_ID="${INFISICAL_UNIVERSAL_AUTH_CLIENT_ID}"
            export INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET="${INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET}"
            infisical run --method=universal-auth --env=prod --domain https://secrets.rayven.cloud -- \
              terraform init -input=false
            infisical run --method=universal-auth --env=prod --domain https://secrets.rayven.cloud -- \
              terraform validate
            if [ "${DRY_RUN}" = "true" ]; then
              infisical run --method=universal-auth --env=prod --domain https://secrets.rayven.cloud -- \
                terraform plan -var-file=terraform.tfvars.production -input=false -no-color
            else
              infisical run --method=universal-auth --env=prod --domain https://secrets.rayven.cloud -- \
                terraform apply -var-file=terraform.tfvars.production -auto-approve -input=false -no-color
            fi
          REMOTE_SCRIPT

      - name: 📣 Notify Slack on Success
        if: success() && !inputs.dry_run
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then exit 0; fi
          PAYLOAD=$(jq -n --arg text "Keycloak設定デプロイ完了: ${RELEASE_TAG:-manual}" '{"text": $text}')
          curl -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: 📣 Notify Slack on Failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then exit 0; fi
          PAYLOAD=$(jq -n --arg text "Keycloak設定デプロイ失敗: ${RELEASE_TAG:-manual}" '{"text": $text}')
          curl -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f /tmp/cloudflared.deb /tmp/cf-proxy.sh ~/.ssh/id_ed25519 ~/.ssh/config
