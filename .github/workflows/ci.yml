name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches: [main]

jobs:
  build:
    name: 🔧 Build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 📝 Create .env file for CI
        run: cp .env.example .env

      - name: 🔧 Build packages
        run: pnpm turbo build

  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 📝 Create .env file for CI
        run: cp .env.example .env

      - name: 🔍 Run lint
        run: pnpm turbo lint

  format:
    name: 💅 Format
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 💅 Check format
        run: pnpm turbo format

  typecheck:
    name: 🔬 Typecheck
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 📝 Create .env file for CI
        run: cp .env.example .env

      - name: 🔬 Run typecheck
        run: pnpm turbo typecheck

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 📝 Create .env file for CI
        run: cp .env.example .env

      - name: 🔧 Build packages
        run: pnpm turbo build

      - name: 🧪 Run tests
        run: pnpm test

  docker-smoke-test:
    name: 🐳 Docker Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: 🔨 Build manager image
        run: docker build -f apps/manager/Dockerfile -t tumiki-manager .

      - name: 🔨 Build mcp-proxy image
        run: docker build -f apps/mcp-proxy/Dockerfile -t tumiki-mcp-proxy .

      - name: 🚀 Start containers
        run: |
          docker run -d --name manager -p 8080:8080 \
            -e KEYCLOAK_CLIENT_ID=test \
            -e KEYCLOAK_CLIENT_SECRET=test \
            -e KEYCLOAK_ISSUER=https://dummy.keycloak.local/realms/tumiki \
            -e DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder \
            -e PRISMA_FIELD_ENCRYPTION_KEY=k1.aesgcm256.FkhfY-sKgaYBJYteXBGudV6g_oBOW1TjU74hbowUl8s= \
            tumiki-manager
          docker run -d --name mcp-proxy -p 8081:8080 \
            -e DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder \
            -e PRISMA_FIELD_ENCRYPTION_KEY=k1.aesgcm256.FkhfY-sKgaYBJYteXBGudV6g_oBOW1TjU74hbowUl8s= \
            tumiki-mcp-proxy

      - name: ✅ Wait and verify health endpoints
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1 && \
               curl -sf http://localhost:8081/health > /dev/null 2>&1; then
              echo "=== Manager ==="
              curl -sf http://localhost:8080/api/health | jq .
              echo "=== MCP Proxy ==="
              curl -sf http://localhost:8081/health | jq .
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Timeout waiting for containers"
          docker logs manager
          docker logs mcp-proxy
          exit 1

  desktop-migration-check:
    name: 🗄️ Desktop Migration Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 🗄️ Check desktop migration status
        working-directory: apps/desktop
        env:
          DESKTOP_DATABASE_URL: file:/tmp/desktop-ci.db
        run: |
          pnpm prisma migrate deploy --schema=./prisma/schema.prisma
          pnpm prisma migrate status --schema=./prisma/schema.prisma

      - name: 🔍 Check schema and migration consistency
        working-directory: apps/desktop
        run: |
          rm -f /tmp/desktop-ci-shadow.db
          DIFF=$(pnpm prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url "file:/tmp/desktop-ci-shadow.db" \
            --exit-code 2>&1) || {
            echo "❌ スキーマとマイグレーションに差分があります。"
            echo "   prisma migrate dev を実行してマイグレーションファイルを生成してください。"
            echo ""
            echo "$DIFF"
            exit 1
          }
