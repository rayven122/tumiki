name: CI

on:
  pull_request:
    branches:
      - main
    types: [opened, ready_for_review, reopened, synchronize]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ✅ Verify
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 🔎 Detect manager build changes
        id: manager_build_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            manager:
              - '.env.example'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'patches/**'
              - 'tooling/**'
              - 'apps/manager/**'
              - 'packages/db/**'
              - 'packages/keycloak/**'
              - 'packages/mailer/**'
              - 'packages/oauth-token-manager/**'
              - 'packages/slack/**'
              - 'packages/license/**'
              - 'packages/prompts/**'
              - 'packages/shared/**'
              - 'packages/ui/**'

      - name: 🔧 Build dependency packages
        if: steps.manager_build_changes.outputs.manager == 'true'
        run: pnpm turbo build --filter=@tumiki/manager^...

      - name: 🔧 Build manager (Infisical不使用・.env.exampleのダミー値を使用)
        if: steps.manager_build_changes.outputs.manager == 'true'
        working-directory: apps/manager
        env:
          NEXT_PUBLIC_TUMIKI_EDITION: ee
        run: cp ../../.env.example .env && pnpm build:bare

      - name: ⏭️ Skip manager build
        if: steps.manager_build_changes.outputs.manager != 'true'
        run: echo "No manager build relevant changes."

      - name: 📝 Create .env file for CI
        run: cp .env.example .env

      - name: 🗃️ Generate Prisma clients
        run: pnpm turbo db:generate

      - name: 🔍 Run lint and format
        run: |
          pnpm turbo lint &
          lint_pid=$!

          pnpm turbo format &
          format_pid=$!

          lint_status=0
          format_status=0

          wait "$lint_pid" || lint_status=$?
          wait "$format_pid" || format_status=$?

          if [ "$lint_status" -ne 0 ] || [ "$format_status" -ne 0 ]; then
            echo "lint exit status: $lint_status"
            echo "format exit status: $format_status"
            exit 1
          fi

      - name: 🔬 Run typecheck
        run: pnpm turbo typecheck --concurrency=1

      - name: 🔧 Build packages (apps は除外・テストに必要なパッケージのみ)
        run: pnpm turbo build --filter="./packages/*"

      - name: 🗃️ Generate app Prisma clients for tests
        run: pnpm turbo db:generate --filter=@tumiki/desktop --filter=@tumiki/tenant-console

      - name: 🧪 Run tests
        env:
          VITEST_TEST_TIMEOUT_MS: "90000"
          VITEST_HOOK_TIMEOUT_MS: "90000"
        run: pnpm exec vitest run --no-file-parallelism

      - name: 🗄️ Check desktop migration status
        working-directory: apps/desktop
        env:
          DESKTOP_DATABASE_URL: file:/tmp/desktop-ci.db
        run: |
          pnpm prisma migrate deploy --schema=./prisma/schema.prisma
          pnpm prisma migrate status --schema=./prisma/schema.prisma

      - name: 🔍 Check schema and migration consistency
        working-directory: apps/desktop
        run: |
          rm -f /tmp/desktop-ci-shadow.db
          DIFF=$(pnpm prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url "file:/tmp/desktop-ci-shadow.db" \
            --exit-code 2>&1) || {
            echo "❌ スキーマとマイグレーションに差分があります。"
            echo "   prisma migrate dev を実行してマイグレーションファイルを生成してください。"
            echo ""
            echo "$DIFF"
            exit 1
          }

      - name: 🔎 Detect Docker smoke changes
        id: docker_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            manager:
              - '.dockerignore'
              - '.env.example'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'patches/**'
              - 'tooling/**'
              - 'apps/manager/**'
              - 'packages/db/**'
              - 'packages/keycloak/**'
              - 'packages/mailer/**'
              - 'packages/oauth-token-manager/**'
              - 'packages/slack/**'
              - 'packages/license/**'
              - 'packages/prompts/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
            mcp_proxy:
              - '.dockerignore'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'patches/**'
              - 'tooling/**'
              - 'apps/mcp-proxy/**'
              - 'packages/db/**'
              - 'packages/license/**'
              - 'packages/mcp-core-proxy/**'
              - 'packages/oauth-token-manager/**'
              - 'packages/prompts/**'
              - 'packages/shared/**'
              - 'packages/slack/**'
            internal_manager:
              - '.dockerignore'
              - '.env.example'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'patches/**'
              - 'tooling/**'
              - 'apps/internal-manager/**'
              - 'packages/db/**'
              - 'packages/internal-db/**'
              - 'packages/keycloak/**'
              - 'packages/ui/**'

      - name: ⚙️ Setup NPM proxy for Docker smoke
        if: steps.docker_changes.outputs.manager == 'true' || steps.docker_changes.outputs.mcp_proxy == 'true' || steps.docker_changes.outputs.internal_manager == 'true'
        uses: ./.github/actions/setup-npm-proxy

      - name: 🐳 Docker smoke manager
        if: steps.docker_changes.outputs.manager == 'true'
        env:
          DOCKER_BUILDKIT: "1"
          IMAGE: tumiki-manager
          CONTAINER: manager
          HOST_PORT: "8080"
          CONTAINER_PORT: "8080"
          HEALTH_PATH: /api/health
          DOCKERFILE: apps/manager/Dockerfile
          SMOKE_ENV_FILE: |
            KEYCLOAK_CLIENT_ID=test
            KEYCLOAK_CLIENT_SECRET=test
            KEYCLOAK_ISSUER=https://dummy.keycloak.local/realms/tumiki
            DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
            SKIP_MIGRATE=true
        run: |
          smoke_prisma_key="k1.aesgcm256.$(printf '12345678901234567890123456789012' | base64 | tr '+/' '-_' | tr -d '=')"
          smoke_env_file="$(mktemp)"
          trap 'rm -f "${smoke_env_file}"' EXIT
          printf 'PRISMA_FIELD_ENCRYPTION_KEY=%s\n' "${smoke_prisma_key}" > "${smoke_env_file}"
          printf '%s\n' "${SMOKE_ENV_FILE}" >> "${smoke_env_file}"

          docker build \
            --build-arg NPM_CONFIG_REGISTRY="${NPM_CONFIG_REGISTRY:-}" \
            -f "${DOCKERFILE}" \
            -t "${IMAGE}" \
            .
          docker run -d --name "${CONTAINER}" \
            -p "${HOST_PORT}:${CONTAINER_PORT}" \
            --env-file "${smoke_env_file}" \
            "${IMAGE}"

          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${HOST_PORT}${HEALTH_PATH}" > /dev/null 2>&1; then
              curl -sf "http://localhost:${HOST_PORT}${HEALTH_PATH}" | jq .
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Timeout waiting for ${CONTAINER}"
          docker logs "${CONTAINER}"
          exit 1

      - name: 🧹 Cleanup manager smoke container
        if: always()
        run: docker rm -f manager || true

      - name: 🐳 Docker smoke mcp-proxy
        if: steps.docker_changes.outputs.mcp_proxy == 'true'
        env:
          DOCKER_BUILDKIT: "1"
          IMAGE: tumiki-mcp-proxy
          CONTAINER: mcp-proxy
          HOST_PORT: "8081"
          CONTAINER_PORT: "8080"
          HEALTH_PATH: /health
          DOCKERFILE: apps/mcp-proxy/Dockerfile
          SMOKE_ENV_FILE: |
            DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: |
          smoke_prisma_key="k1.aesgcm256.$(printf '12345678901234567890123456789012' | base64 | tr '+/' '-_' | tr -d '=')"
          smoke_env_file="$(mktemp)"
          trap 'rm -f "${smoke_env_file}"' EXIT
          printf 'PRISMA_FIELD_ENCRYPTION_KEY=%s\n' "${smoke_prisma_key}" > "${smoke_env_file}"
          printf '%s\n' "${SMOKE_ENV_FILE}" >> "${smoke_env_file}"

          docker build \
            --build-arg NPM_CONFIG_REGISTRY="${NPM_CONFIG_REGISTRY:-}" \
            -f "${DOCKERFILE}" \
            -t "${IMAGE}" \
            .
          docker run -d --name "${CONTAINER}" \
            -p "${HOST_PORT}:${CONTAINER_PORT}" \
            --env-file "${smoke_env_file}" \
            "${IMAGE}"

          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${HOST_PORT}${HEALTH_PATH}" > /dev/null 2>&1; then
              curl -sf "http://localhost:${HOST_PORT}${HEALTH_PATH}" | jq .
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Timeout waiting for ${CONTAINER}"
          docker logs "${CONTAINER}"
          exit 1

      - name: 🧹 Cleanup mcp-proxy smoke container
        if: always()
        run: docker rm -f mcp-proxy || true

      - name: 🐳 Docker smoke internal-manager
        if: steps.docker_changes.outputs.internal_manager == 'true'
        env:
          DOCKER_BUILDKIT: "1"
          IMAGE: tumiki-internal-manager
          CONTAINER: internal-manager
          HOST_PORT: "3100"
          CONTAINER_PORT: "3100"
          HEALTH_PATH: /api/health
          DOCKERFILE: apps/internal-manager/Dockerfile
          SMOKE_ENV_FILE: |
            TUMIKI_INTERNAL_MANAGER_SECRET_KEY=dummy-internal-manager-secret-key
            TUMIKI_INTERNAL_MANAGER_OIDC_PRIVATE_KEY=placeholder-for-healthcheck-only
            TUMIKI_INTERNAL_MANAGER_PUBLIC_URL=http://localhost:3100
            TUMIKI_INTERNAL_MANAGER_OIDC_DISCOVERY_URL=https://dummy.oidc.local/.well-known/openid-configuration
            TUMIKI_INTERNAL_MANAGER_OIDC_CLIENT_ID=test
            TUMIKI_INTERNAL_MANAGER_OIDC_CLIENT_SECRET=test
            DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
            INTERNAL_DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
            SKIP_MIGRATE=true
        run: |
          smoke_prisma_key="k1.aesgcm256.$(printf '12345678901234567890123456789012' | base64 | tr '+/' '-_' | tr -d '=')"
          smoke_env_file="$(mktemp)"
          trap 'rm -f "${smoke_env_file}"' EXIT
          printf 'PRISMA_FIELD_ENCRYPTION_KEY=%s\n' "${smoke_prisma_key}" > "${smoke_env_file}"
          printf '%s\n' "${SMOKE_ENV_FILE}" >> "${smoke_env_file}"

          docker build \
            --build-arg NPM_CONFIG_REGISTRY="${NPM_CONFIG_REGISTRY:-}" \
            -f "${DOCKERFILE}" \
            -t "${IMAGE}" \
            .
          docker run -d --name "${CONTAINER}" \
            -p "${HOST_PORT}:${CONTAINER_PORT}" \
            --env-file "${smoke_env_file}" \
            "${IMAGE}"

          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${HOST_PORT}${HEALTH_PATH}" > /dev/null 2>&1; then
              curl -sf "http://localhost:${HOST_PORT}${HEALTH_PATH}" | jq .
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Timeout waiting for ${CONTAINER}"
          docker logs "${CONTAINER}"
          exit 1

      - name: 🧹 Cleanup internal-manager smoke container
        if: always()
        run: docker rm -f internal-manager || true

      - name: ⏭️ Skip Docker smoke
        if: steps.docker_changes.outputs.manager != 'true' && steps.docker_changes.outputs.mcp_proxy != 'true' && steps.docker_changes.outputs.internal_manager != 'true'
        run: echo "No Docker smoke relevant changes."
