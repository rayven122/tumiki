name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches: [main]

jobs:
  build:
    name: 🔧 Build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 🔧 Build dependency packages
        run: pnpm turbo build --filter=@tumiki/manager^...

      - name: 🔧 Build manager (Infisical不使用・.env.exampleのダミー値を使用)
        working-directory: apps/manager
        env:
          NEXT_PUBLIC_TUMIKI_EDITION: ee
        run: cp ../../.env.example .env && pnpm build:bare

  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 🔍 Run lint
        run: pnpm turbo lint

  format:
    name: 💅 Format
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 💅 Check format
        run: pnpm turbo format

  typecheck:
    name: 🔬 Typecheck
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 📝 Create .env file for CI
        run: cp .env.example .env

      - name: 🗃️ Generate Prisma clients
        run: pnpm turbo db:generate

      - name: 🔬 Run typecheck
        run: pnpm turbo typecheck

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 📝 Create .env file for CI
        run: cp .env.example .env

      - name: 🔧 Build packages (apps は除外・テストに必要なパッケージのみ)
        run: pnpm turbo build --filter="./packages/*"

      - name: 🧪 Run tests
        run: pnpm test

  docker-smoke-changes:
    name: 🐳 Docker Smoke Changes
    runs-on: ubuntu-latest
    outputs:
      manager: ${{ steps.filter.outputs.manager }}
      mcp_proxy: ${{ steps.filter.outputs.mcp_proxy }}
      internal_manager: ${{ steps.filter.outputs.internal_manager }}
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: 🔎 Detect Docker smoke changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            manager:
              - '.dockerignore'
              - '.env.example'
              - '.github/workflows/ci.yml'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'patches/**'
              - 'tooling/**'
              - 'apps/manager/**'
              - 'packages/db/**'
              - 'packages/keycloak/**'
              - 'packages/mailer/**'
              - 'packages/oauth-token-manager/**'
              - 'packages/slack/**'
              - 'packages/license/**'
              - 'packages/prompts/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
            mcp_proxy:
              - '.dockerignore'
              - '.github/workflows/ci.yml'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'patches/**'
              - 'tooling/**'
              - 'apps/mcp-proxy/**'
              - 'packages/db/**'
              - 'packages/license/**'
              - 'packages/mcp-core-proxy/**'
              - 'packages/oauth-token-manager/**'
              - 'packages/prompts/**'
              - 'packages/shared/**'
              - 'packages/slack/**'
            internal_manager:
              - '.dockerignore'
              - '.env.example'
              - '.github/workflows/ci.yml'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'patches/**'
              - 'tooling/**'
              - 'apps/internal-manager/**'
              - 'packages/db/**'
              - 'packages/internal-db/**'
              - 'packages/keycloak/**'
              - 'packages/ui/**'

  docker-smoke-images:
    name: 🐳 Docker Smoke Image (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: docker-smoke-changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: manager
            change_output: manager
            image: tumiki-manager
            dockerfile: apps/manager/Dockerfile
            container: manager
            host_port: 8080
            container_port: 8080
            health_path: /api/health
            env_args: >-
              -e KEYCLOAK_CLIENT_ID=test
              -e KEYCLOAK_CLIENT_SECRET=test
              -e KEYCLOAK_ISSUER=https://dummy.keycloak.local/realms/tumiki
              -e DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
          - app: mcp-proxy
            change_output: mcp_proxy
            image: tumiki-mcp-proxy
            dockerfile: apps/mcp-proxy/Dockerfile
            container: mcp-proxy
            host_port: 8081
            container_port: 8080
            health_path: /health
            env_args: >-
              -e DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
          - app: internal-manager
            change_output: internal_manager
            image: tumiki-internal-manager
            dockerfile: apps/internal-manager/Dockerfile
            container: internal-manager
            host_port: 3100
            container_port: 3100
            health_path: /api/health
            env_args: >-
              -e OIDC_CLIENT_ID=test
              -e OIDC_CLIENT_SECRET=test
              -e OIDC_ISSUER=https://dummy.oidc.local
              -e AUTH_SECRET=dummy-auth-secret-for-smoke-test
              -e DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: 🧱 Setup Docker Buildx
        if: needs.docker-smoke-changes.outputs[matrix.change_output] == 'true'
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build image
        if: needs.docker-smoke-changes.outputs[matrix.change_output] == 'true'
        run: |
          docker buildx build \
            --load \
            --cache-from type=gha,scope=docker-smoke-${{ matrix.app }} \
            --cache-to type=gha,mode=max,scope=docker-smoke-${{ matrix.app }} \
            -f "${{ matrix.dockerfile }}" \
            -t "${{ matrix.image }}" \
            .

      - name: 🚀 Start container
        if: needs.docker-smoke-changes.outputs[matrix.change_output] == 'true'
        run: |
          smoke_prisma_key="k1.aesgcm256.$(printf '12345678901234567890123456789012' | base64 | tr '+/' '-_' | tr -d '=')"
          docker run -d --name "${{ matrix.container }}" \
            -p "${{ matrix.host_port }}:${{ matrix.container_port }}" \
            -e PRISMA_FIELD_ENCRYPTION_KEY="${smoke_prisma_key}" \
            ${{ matrix.env_args }} \
            "${{ matrix.image }}"

      - name: ✅ Wait and verify health endpoint
        if: needs.docker-smoke-changes.outputs[matrix.change_output] == 'true'
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${{ matrix.host_port }}${{ matrix.health_path }}" > /dev/null 2>&1; then
              curl -sf "http://localhost:${{ matrix.host_port }}${{ matrix.health_path }}" | jq .
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Timeout waiting for ${{ matrix.container }}"
          docker logs "${{ matrix.container }}"
          exit 1

      - name: ⏭️ Skip unchanged image
        if: needs.docker-smoke-changes.outputs[matrix.change_output] != 'true'
        run: echo "No Docker smoke relevant changes for ${{ matrix.app }}."

      - name: 🧹 Cleanup container
        if: always()
        run: docker rm -f "${{ matrix.container }}" || true

  docker-smoke-test:
    name: 🐳 Docker Smoke Test
    runs-on: ubuntu-latest
    needs: docker-smoke-images
    if: always()
    steps:
      - name: ✅ Verify smoke image jobs
        run: |
          if [ "${{ needs.docker-smoke-images.result }}" != "success" ]; then
            echo "Docker smoke image jobs finished with: ${{ needs.docker-smoke-images.result }}"
            exit 1
          fi
          echo "All Docker smoke image jobs passed."

  desktop-migration-check:
    name: 🗄️ Desktop Migration Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v6

      - name: ⚙️ Setup
        uses: ./.github/actions/setup

      - name: 🗄️ Check desktop migration status
        working-directory: apps/desktop
        env:
          DESKTOP_DATABASE_URL: file:/tmp/desktop-ci.db
        run: |
          pnpm prisma migrate deploy --schema=./prisma/schema.prisma
          pnpm prisma migrate status --schema=./prisma/schema.prisma

      - name: 🔍 Check schema and migration consistency
        working-directory: apps/desktop
        run: |
          rm -f /tmp/desktop-ci-shadow.db
          DIFF=$(pnpm prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url "file:/tmp/desktop-ci-shadow.db" \
            --exit-code 2>&1) || {
            echo "❌ スキーマとマイグレーションに差分があります。"
            echo "   prisma migrate dev を実行してマイグレーションファイルを生成してください。"
            echo ""
            echo "$DIFF"
            exit 1
          }
