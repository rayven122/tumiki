name: Deploy Apps

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: "デプロイ先環境"
        type: choice
        options: [staging, production]
        default: staging
      image_tag:
        description: "イメージタグ（staging: main / production は Watchtower が自動追従するため通常未指定）"
        type: string

concurrency:
  group: deploy-apps-${{ github.event.workflow_run.head_branch || inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-staging:
    name: 🚀 Deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.repository.full_name == github.repository &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment: staging
    env:
      IMAGE_TAG: ${{ inputs.image_tag || 'main' }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      SSH_HOST: stg-ssh.tumiki.cloud
      SSH_USER: staging-deploy

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🌐 Setup Cloudflare SSH
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          ssh-host: ${{ env.SSH_HOST }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: 🔐 Fetch secrets from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_SECRET }}
          domain: https://secrets.rayven.cloud
          project-slug: tumiki
          env-slug: staging
          secret-path: /
          recursive: true
          export-type: file
          # file-output-path は ${GITHUB_WORKSPACE} と単純連結される仕様（先頭 / は連結区切り扱い）
          # /tmp など絶対パスは使えず、ワークスペース直下にのみ書き込み可能
          file-output-path: /tumiki.env

      - name: 🔒 Restrict secrets file permissions
        run: chmod 600 tumiki.env

      - name: 📤 Transfer compose files and .env
        run: |
          # 前回 cleanup が失敗していた場合に備えて既存 .env を削除（リカバリ）
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" "mkdir -p ~/tumiki && rm -f ~/tumiki/.env"
          scp -i ~/.ssh/id_ed25519 docker/apps/compose.yaml "${SSH_USER}@${SSH_HOST}:~/tumiki/compose.yaml"
          scp -i ~/.ssh/id_ed25519 docker/apps/compose.staging.yaml "${SSH_USER}@${SSH_HOST}:~/tumiki/compose.staging.yaml"
          # install -m 600 でファイル作成と権限設定をアトミックに実施（scp + chmod のウィンドウを排除）
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" 'install -m 600 /dev/stdin ~/tumiki/.env' < tumiki.env

      - name: 🐳 Deploy containers
        run: |
          # IMAGE_TAG はシェルインジェクション防止のため bash 引数として渡し $1 でエスケープ
          # ヒアドキュメントは quoted で runner 側変数の意図しない展開を防ぐ
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash -ls -- "${IMAGE_TAG}" << 'REMOTE_SCRIPT'
            set -euo pipefail
            set +o history
            export IMAGE_TAG="$1"
            cd ~/tumiki
            docker compose -f compose.yaml -f compose.staging.yaml pull
            docker compose -f compose.yaml -f compose.staging.yaml up -d --remove-orphans
            rm -f .env
          REMOTE_SCRIPT

      - name: ✅ Verify health endpoints
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash << 'HEALTHCHECK'
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:8081/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:3100/api/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:9000/minio/health/live > /dev/null 2>&1; then
                echo "=== Manager ===" && curl -sf http://localhost:8080/api/health | jq .
                echo "=== MCP Proxy ===" && curl -sf http://localhost:8081/health | jq .
                echo "=== Internal Manager ===" && curl -sf http://localhost:3100/api/health | jq .
                echo "=== MinIO ===" && curl -sf http://localhost:9000/minio/health/live
                exit 0
              fi
              echo "Waiting... ($i/30)" && sleep 5
            done
            echo "Timeout: コンテナが起動しませんでした"
            cd ~/tumiki && docker compose logs --tail=50
            exit 1
          HEALTHCHECK

      - name: 🧹 Cleanup
        if: always()
        run: |
          # デプロイ失敗時に VM 上に .env が残らないよう SSH 越しに確実に削除
          # SSH 鍵を削除する前に実行する必要がある
          # 削除失敗時は warning を出して運用側で検知できるようにする（cleanup の失敗で job 自体は失敗扱いにしない）
          ssh -i ~/.ssh/id_ed25519 -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" 'rm -f ~/tumiki/.env' \
            || echo "::warning::VM上の .env 削除に失敗しました。手動確認が必要です"
          rm -f /tmp/cloudflared.deb /tmp/cf-proxy.sh tumiki.env ~/.ssh/id_ed25519

  deploy-production:
    name: 🚀 Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # production では Infisical を SoT として VM 上の systemd timer
    # (tumiki-secrets-sync) が .env を生成・更新する。image 自動更新は VM 上の Watchtower が担う。
    # このジョブは compose.production.yaml が変わったときの転送と再同期トリガーのみを担当する。
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    environment: production

    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      SSH_HOST: ${{ vars.DEPLOY_TUNNEL_HOSTNAME }}
      SSH_USER: ${{ vars.DEPLOY_USER }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🌐 Setup Cloudflare SSH
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          ssh-host: ${{ env.SSH_HOST }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: ⚠️ Warn ignored image tag
        if: inputs.image_tag != ''
        run: |
          echo "::warning::production では image_tag='${{ inputs.image_tag }}' は使用されません。:latest を Watchtower が自動追従します。"

      - name: 📤 Transfer compose.production.yaml
        run: |
          # production では .env を Actions から触らない（Infisical SoT を維持）。
          # compose ファイルだけ転送し、シークレットの反映は VM 上の tumiki-secrets-sync に任せる。
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" "mkdir -p ~/tumiki"
          scp -i ~/.ssh/id_ed25519 docker/apps/compose.production.yaml "${SSH_USER}@${SSH_HOST}:~/tumiki/compose.production.yaml"

      - name: 🔄 Trigger secrets sync and reconcile compose
        run: |
          # systemd の oneshot サービスを発火することで Infisical から最新の .env を取り込み、
          # 必要があれば docker compose up -d を実行する。
          # NoNewPrivileges 等の制限を尊重し、journal にログを残すため systemctl start を使用。
          # DEPLOY_USER の sudoers は tumiki-secrets-sync.service の start / status のみに絞る。
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash << 'REMOTE_SCRIPT'
            set -euo pipefail
            # oneshot service の完了まで systemctl start がブロックし、失敗時は非ゼロで終了する。
            sudo systemctl start tumiki-secrets-sync.service
            sudo systemctl status --no-pager tumiki-secrets-sync.service
          REMOTE_SCRIPT

      - name: ✅ Verify health endpoints
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash << 'HEALTHCHECK'
            # compose.production.yaml の host bind:
            # manager 127.0.0.1:3000->8080 / mcp-proxy 127.0.0.1:8080->8080
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "=== Manager ===" && curl -sf http://localhost:3000/api/health | jq .
                echo "=== MCP Proxy ===" && curl -sf http://localhost:8080/health | jq .
                exit 0
              fi
              echo "Waiting... ($i/30)" && sleep 5
            done
            echo "Timeout: コンテナが起動しませんでした"
            cd ~/tumiki && docker compose -f compose.production.yaml logs --tail=50
            exit 1
          HEALTHCHECK

      - name: 🧹 Cleanup
        if: always()
        run: |
          # production では .env を Actions が扱わないため後始末対象は SSH 鍵のみ
          rm -f /tmp/cloudflared.deb /tmp/cf-proxy.sh ~/.ssh/id_ed25519
