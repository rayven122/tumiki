name: Deploy Apps

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        type: choice
        options: [staging, production]
        default: staging
      image_tag:
        description: 'イメージタグ（staging: main / production: latest）'
        type: string

concurrency:
  group: deploy-apps-${{ github.event.workflow_run.head_branch || inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-staging:
    name: 🚀 Deploy to staging
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.repository.full_name == github.repository &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment: staging

    env:
      IMAGE_TAG: ${{ inputs.image_tag || 'main' }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      SSH_HOST: stg-ssh.tumiki.cloud
      SSH_USER: staging-deploy

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🌐 Setup Cloudflare SSH
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          ssh-host: ${{ env.SSH_HOST }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: 🔐 Fetch secrets from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_SECRET }}
          domain: https://secrets.rayven.cloud
          project-slug: tumiki
          env-slug: staging
          secret-path: /
          recursive: true
          export-type: file
          file-output-path: /tmp/tumiki.env

      - name: 🔒 Restrict secrets file permissions
        run: chmod 600 /tmp/tumiki.env

      - name: 📤 Transfer compose.yaml and .env
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" "echo connected && mkdir -p ~/tumiki"
          scp -i ~/.ssh/id_ed25519 docker/apps/compose.yaml "${SSH_USER}@${SSH_HOST}:~/tumiki/compose.yaml"
          scp -i ~/.ssh/id_ed25519 /tmp/tumiki.env "${SSH_USER}@${SSH_HOST}:~/tumiki/.env"

      - name: 🐳 Deploy containers
        run: |
          # IMAGE_TAG はシェルインジェクション防止のため bash 引数として渡し $1 でエスケープ
          # ヒアドキュメントは quoted で runner 側変数の意図しない展開を防ぐ
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash -ls -- "${IMAGE_TAG}" << 'REMOTE_SCRIPT'
            set -euo pipefail
            set +o history
            export IMAGE_TAG="$1"
            cd ~/tumiki
            docker compose pull
            docker compose up -d --remove-orphans
            rm -f .env
          REMOTE_SCRIPT

      - name: ✅ Verify health endpoints
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash << 'HEALTHCHECK'
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:8081/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:3100/api/health > /dev/null 2>&1; then
                echo "=== Manager ===" && curl -sf http://localhost:8080/api/health | jq .
                echo "=== MCP Proxy ===" && curl -sf http://localhost:8081/health | jq .
                echo "=== Internal Manager ===" && curl -sf http://localhost:3100/api/health | jq .
                exit 0
              fi
              echo "Waiting... ($i/20)" && sleep 5
            done
            echo "Timeout: コンテナが起動しませんでした"
            cd ~/tumiki && docker compose logs --tail=50
            exit 1
          HEALTHCHECK

      - name: 🧹 Cleanup
        if: always()
        run: |
          # デプロイ失敗時に VM 上に .env が残らないよう SSH 越しに確実に削除
          # SSH 鍵を削除する前に実行する必要がある
          ssh -i ~/.ssh/id_ed25519 -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" 'rm -f ~/tumiki/.env' || true
          rm -f /tmp/cloudflared.deb /tmp/cf-proxy.sh /tmp/tumiki.env ~/.ssh/id_ed25519

  deploy-production:
    name: 🚀 Deploy to production
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.repository.full_name == github.repository &&
       startsWith(github.event.workflow_run.head_branch, 'v') &&
       contains(github.event.workflow_run.head_branch, '.')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment: production

    env:
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      SSH_HOST: ${{ vars.DEPLOY_TUNNEL_HOSTNAME }}
      SSH_USER: ${{ vars.DEPLOY_USER }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🌐 Setup Cloudflare SSH
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          ssh-host: ${{ env.SSH_HOST }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: 🔐 Fetch secrets from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_MACHINE_IDENTITY_CLIENT_SECRET }}
          domain: https://secrets.rayven.cloud
          project-slug: tumiki
          env-slug: prod
          secret-path: /
          recursive: true
          export-type: file
          file-output-path: /tmp/tumiki.env

      - name: 🔒 Restrict secrets file permissions
        run: chmod 600 /tmp/tumiki.env

      - name: 📤 Transfer compose.yaml and .env
        run: |
          ssh -o ConnectTimeout=30 -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" "echo connected && mkdir -p ~/tumiki"
          scp -i ~/.ssh/id_ed25519 docker/apps/compose.yaml "${SSH_USER}@${SSH_HOST}:~/tumiki/compose.yaml"
          scp -i ~/.ssh/id_ed25519 /tmp/tumiki.env "${SSH_USER}@${SSH_HOST}:~/tumiki/.env"

      - name: 🐳 Deploy containers
        run: |
          # IMAGE_TAG はシェルインジェクション防止のため bash 引数として渡し $1 でエスケープ
          # ヒアドキュメントは quoted で runner 側変数の意図しない展開を防ぐ
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash -ls -- "${IMAGE_TAG}" << 'REMOTE_SCRIPT'
            set -euo pipefail
            set +o history
            export IMAGE_TAG="$1"
            cd ~/tumiki
            docker compose pull
            docker compose up -d --remove-orphans
            rm -f .env
          REMOTE_SCRIPT

      - name: ✅ Verify health endpoints
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" bash << 'HEALTHCHECK'
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:8081/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:3100/api/health > /dev/null 2>&1; then
                echo "=== Manager ===" && curl -sf http://localhost:8080/api/health | jq .
                echo "=== MCP Proxy ===" && curl -sf http://localhost:8081/health | jq .
                echo "=== Internal Manager ===" && curl -sf http://localhost:3100/api/health | jq .
                exit 0
              fi
              echo "Waiting... ($i/20)" && sleep 5
            done
            echo "Timeout: コンテナが起動しませんでした"
            cd ~/tumiki && docker compose logs --tail=50
            exit 1
          HEALTHCHECK

      - name: 🧹 Cleanup
        if: always()
        run: |
          # デプロイ失敗時に VM 上に .env が残らないよう SSH 越しに確実に削除
          # SSH 鍵を削除する前に実行する必要がある
          ssh -i ~/.ssh/id_ed25519 -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" 'rm -f ~/tumiki/.env' || true
          rm -f /tmp/cloudflared.deb /tmp/cf-proxy.sh /tmp/tumiki.env ~/.ssh/id_ed25519
