name: Deploy Apps

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        type: choice
        options: [staging, production]
        default: staging
      image_tag:
        description: 'イメージタグ（staging: main / production: latest）'
        type: string

concurrency:
  group: deploy-apps-${{ github.event.workflow_run.head_branch || inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-staging:
    name: 🚀 Deploy to staging
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment: staging

    env:
      IMAGE_TAG: ${{ inputs.image_tag || 'main' }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      SSH_HOST: stg-ssh.tumiki.cloud
      SSH_USER: hisuzuya
      SSH_PORT: 2222

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: 🌐 Start Cloudflare TCP proxy
        run: |
          cloudflared access tcp --hostname "${SSH_HOST}" --url "localhost:${SSH_PORT}" &
          echo "CLOUDFLARED_PID=$!" >> "$GITHUB_ENV"
          sleep 3

      - name: 📤 Transfer compose.yaml
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT}" localhost 2>/dev/null >> ~/.ssh/known_hosts || true
          ssh -p "${SSH_PORT}" "${SSH_USER}@localhost" "mkdir -p ~/tumiki"
          scp -P "${SSH_PORT}" docker/apps/compose.yaml "${SSH_USER}@localhost:~/tumiki/compose.yaml"

      - name: 🐳 Deploy containers
        run: |
          IMAGE_TAG_VAL="${IMAGE_TAG}"
          ssh -p "${SSH_PORT}" "${SSH_USER}@localhost" bash -l << REMOTE_SCRIPT
            set -euo pipefail
            cd ~/tumiki
            export IMAGE_TAG="${IMAGE_TAG_VAL}"
            infisical export --env=staging --format=dotenv > .env
            docker compose pull
            docker compose up -d --remove-orphans
            rm -f .env
          REMOTE_SCRIPT

      - name: ✅ Verify health endpoints
        run: |
          ssh -p "${SSH_PORT}" "${SSH_USER}@localhost" bash << 'HEALTHCHECK'
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:8081/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:3100/api/health > /dev/null 2>&1; then
                echo "=== Manager ===" && curl -sf http://localhost:8080/api/health | jq .
                echo "=== MCP Proxy ===" && curl -sf http://localhost:8081/health | jq .
                echo "=== Internal Manager ===" && curl -sf http://localhost:3100/api/health | jq .
                exit 0
              fi
              echo "Waiting... ($i/20)" && sleep 5
            done
            echo "Timeout: コンテナが起動しませんでした"
            docker compose logs --tail=50
            exit 1
          HEALTHCHECK

      - name: 🧹 Cleanup
        if: always()
        run: |
          kill "${CLOUDFLARED_PID}" 2>/dev/null || true
          rm -f /tmp/cloudflared.deb

  deploy-production:
    name: 🚀 Deploy to production
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v') &&
       contains(github.event.workflow_run.head_branch, '.')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment: production

    env:
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      SSH_HOST: ${{ vars.DEPLOY_TUNNEL_HOSTNAME }}
      SSH_USER: ${{ vars.DEPLOY_USER }}
      SSH_PORT: 2222

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: 🌐 Start Cloudflare TCP proxy
        run: |
          cloudflared access tcp --hostname "${SSH_HOST}" --url "localhost:${SSH_PORT}" &
          echo "CLOUDFLARED_PID=$!" >> "$GITHUB_ENV"
          sleep 3

      - name: 📤 Transfer compose.yaml
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT}" localhost 2>/dev/null >> ~/.ssh/known_hosts || true
          ssh -p "${SSH_PORT}" "${SSH_USER}@localhost" "mkdir -p ~/tumiki"
          scp -P "${SSH_PORT}" docker/apps/compose.yaml "${SSH_USER}@localhost:~/tumiki/compose.yaml"

      - name: 🐳 Deploy containers
        run: |
          IMAGE_TAG_VAL="${IMAGE_TAG}"
          ssh -p "${SSH_PORT}" "${SSH_USER}@localhost" bash -l << REMOTE_SCRIPT
            set -euo pipefail
            cd ~/tumiki
            export IMAGE_TAG="${IMAGE_TAG_VAL}"
            infisical export --env=prod --format=dotenv > .env
            docker compose pull
            docker compose up -d --remove-orphans
            rm -f .env
          REMOTE_SCRIPT

      - name: ✅ Verify health endpoints
        run: |
          ssh -p "${SSH_PORT}" "${SSH_USER}@localhost" bash << 'HEALTHCHECK'
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:8081/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:3100/api/health > /dev/null 2>&1; then
                echo "=== Manager ===" && curl -sf http://localhost:8080/api/health | jq .
                echo "=== MCP Proxy ===" && curl -sf http://localhost:8081/health | jq .
                echo "=== Internal Manager ===" && curl -sf http://localhost:3100/api/health | jq .
                exit 0
              fi
              echo "Waiting... ($i/20)" && sleep 5
            done
            echo "Timeout: コンテナが起動しませんでした"
            docker compose logs --tail=50
            exit 1
          HEALTHCHECK

      - name: 🧹 Cleanup
        if: always()
        run: |
          kill "${CLOUDFLARED_PID}" 2>/dev/null || true
          rm -f /tmp/cloudflared.deb
