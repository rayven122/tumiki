name: Deploy Apps

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        type: choice
        options: [staging, production]
        default: staging
      image_tag:
        description: 'イメージタグ（staging: main / production: latest）'
        type: string

concurrency:
  group: deploy-apps-${{ github.event.workflow_run.head_branch || inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-staging:
    name: 🚀 Deploy to staging
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment: staging

    env:
      IMAGE_TAG: ${{ inputs.image_tag || 'main' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Configure SSH (Cloudflare Tunnel)
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          tunnel-hostname: stg-ssh.tumiki.cloud
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: 🔍 Debug cloudflared auth
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          echo "CF_ACCESS_CLIENT_ID length: ${#CF_ACCESS_CLIENT_ID}"
          echo "CF_ACCESS_CLIENT_SECRET length: ${#CF_ACCESS_CLIENT_SECRET}"
          cat /tmp/cf-proxy.sh || echo "cf-proxy.sh not found"
          echo "---"
          CF_ACCESS_CLIENT_ID="${CF_ACCESS_CLIENT_ID}" CF_ACCESS_CLIENT_SECRET="${CF_ACCESS_CLIENT_SECRET}" \
            cloudflared access token --app-url https://stg-ssh.tumiki.cloud 2>&1 | head -5 || true

      - name: 📤 Transfer compose.yaml
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          ssh "hisuzuya@stg-ssh.tumiki.cloud" "mkdir -p ~/tumiki"
          scp docker/apps/compose.yaml "hisuzuya@stg-ssh.tumiki.cloud:~/tumiki/compose.yaml"

      - name: 🐳 Deploy containers
        run: |
          IMAGE_TAG_VAL="${IMAGE_TAG}"
          ssh "hisuzuya@stg-ssh.tumiki.cloud" bash -l << REMOTE_SCRIPT
            set -euo pipefail
            cd ~/tumiki
            export IMAGE_TAG="${IMAGE_TAG_VAL}"
            infisical export --env=staging --format=dotenv > .env
            docker compose pull
            docker compose up -d --remove-orphans
            rm -f .env
          REMOTE_SCRIPT

      - name: ✅ Verify health endpoints
        run: |
          ssh "hisuzuya@stg-ssh.tumiki.cloud" bash << 'HEALTHCHECK'
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:8081/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:3100/api/health > /dev/null 2>&1; then
                echo "=== Manager ===" && curl -sf http://localhost:8080/api/health | jq .
                echo "=== MCP Proxy ===" && curl -sf http://localhost:8081/health | jq .
                echo "=== Internal Manager ===" && curl -sf http://localhost:3100/api/health | jq .
                exit 0
              fi
              echo "Waiting... ($i/20)" && sleep 5
            done
            echo "Timeout: コンテナが起動しませんでした"
            docker compose logs --tail=50
            exit 1
          HEALTHCHECK

      - name: 🧹 Cleanup
        if: always()
        run: rm -f ~/.ssh/config /tmp/cloudflared.deb

  deploy-production:
    name: 🚀 Deploy to production
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v') &&
       contains(github.event.workflow_run.head_branch, '.')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment: production

    env:
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Configure SSH (Cloudflare Tunnel)
        uses: ./.github/actions/setup-cloudflare-ssh
        with:
          tunnel-hostname: ${{ vars.DEPLOY_TUNNEL_HOSTNAME }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: 📤 Transfer compose.yaml
        env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_TUNNEL_HOSTNAME: ${{ vars.DEPLOY_TUNNEL_HOSTNAME }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_TUNNEL_HOSTNAME}" "mkdir -p ~/tumiki"
          scp docker/apps/compose.yaml "${DEPLOY_USER}@${DEPLOY_TUNNEL_HOSTNAME}:~/tumiki/compose.yaml"

      - name: 🐳 Deploy containers
        env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_TUNNEL_HOSTNAME: ${{ vars.DEPLOY_TUNNEL_HOSTNAME }}
        run: |
          IMAGE_TAG_VAL="${IMAGE_TAG}"
          ssh "${DEPLOY_USER}@${DEPLOY_TUNNEL_HOSTNAME}" bash -l << REMOTE_SCRIPT
            set -euo pipefail
            cd ~/tumiki
            export IMAGE_TAG="${IMAGE_TAG_VAL}"
            infisical export --env=prod --format=dotenv > .env
            docker compose pull
            docker compose up -d --remove-orphans
            rm -f .env
          REMOTE_SCRIPT

      - name: ✅ Verify health endpoints
        env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_TUNNEL_HOSTNAME: ${{ vars.DEPLOY_TUNNEL_HOSTNAME }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_TUNNEL_HOSTNAME}" bash << 'HEALTHCHECK'
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:8081/health > /dev/null 2>&1 && \
                 curl -sf http://localhost:3100/api/health > /dev/null 2>&1; then
                echo "=== Manager ===" && curl -sf http://localhost:8080/api/health | jq .
                echo "=== MCP Proxy ===" && curl -sf http://localhost:8081/health | jq .
                echo "=== Internal Manager ===" && curl -sf http://localhost:3100/api/health | jq .
                exit 0
              fi
              echo "Waiting... ($i/20)" && sleep 5
            done
            echo "Timeout: コンテナが起動しませんでした"
            docker compose logs --tail=50
            exit 1
          HEALTHCHECK

      - name: 🧹 Cleanup
        if: always()
        run: rm -f ~/.ssh/config /tmp/cloudflared.deb
