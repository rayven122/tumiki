<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tumiki Desktop</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- ブラウザ直接起動時のElectron IPC モック（開発確認用） -->
    <script>
      if (typeof window !== "undefined" && !window.electronAPI) {
        let _savedUrl = null;
        window.electronAPI = {
          versions: {
            node: () => "mock",
            chrome: () => "mock",
            electron: () => "mock",
          },
          auth: {
            getToken: () => Promise.resolve(null),
            isAuthenticated: () => Promise.resolve(false),
            login: () => {
              alert(
                "[mock] auth:login — OAuthフローを開始します\n（実際のElectron環境でブラウザが開きます）",
              );
              return Promise.resolve();
            },
            cancelLogin: () => Promise.resolve(),
            logout: () => Promise.resolve(),
            onCallbackSuccess: () => () => {},
            onCallbackError: () => () => {},
            onSessionExpired: () => () => {},
          },
          manager: {
            getUrl: () => Promise.resolve(_savedUrl),
            connect: (url) => {
              console.log("[mock] manager:connect", url);
              return fetch(url + "/api/auth/config")
                .then((r) => {
                  if (!r.ok) throw new Error("HTTP " + r.status);
                  return r.json();
                })
                .then((cfg) => {
                  console.log("[mock] OIDC config:", cfg);
                  _savedUrl = url;
                  alert(
                    "[mock] 接続成功！\nissuer: " +
                      cfg.issuer +
                      "\nclientId: " +
                      cfg.clientId,
                  );
                });
            },
          },
          catalog: { getAll: () => Promise.resolve([]) },
          mcp: {
            getAll: () => Promise.resolve([]),
            createFromCatalog: () =>
              Promise.resolve({ serverId: 0, serverName: "" }),
            createVirtualServer: () =>
              Promise.resolve({ serverId: 0, serverName: "" }),
            updateServer: () => Promise.resolve({}),
            deleteServer: () => Promise.resolve(),
            toggleServer: () => Promise.resolve({}),
            getDetail: () => Promise.resolve(null),
          },
          audit: {
            list: () => Promise.resolve({ items: [], total: 0 }),
            listByServer: () => Promise.resolve({ items: [], total: 0 }),
            prune: () => Promise.resolve(0),
          },
          dashboard: {
            get: () =>
              Promise.resolve({
                kpi: {},
                timeSeries: [],
                connectors: [],
                aiClients: [],
                connectorStatuses: [],
                connectorCards: [],
                recentLogs: [],
              }),
          },
          oauth: {
            startAuth: () => Promise.resolve(),
            cancelAuth: () => Promise.resolve(),
            onOAuthSuccess: () => () => {},
            onOAuthError: () => () => {},
          },
        };
        console.log("[dev-mock] window.electronAPI が注入されました");
      }
    </script>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
